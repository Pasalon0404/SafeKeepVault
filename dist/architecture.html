    <title>Custody Architecture Planner | SafeKeepBitcoin</title>
    
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --primary: #f7931a;
            --teal: #03dac6;
            --border-color: #333333;
            --box-bg: #2c2c2c;
            --text-muted: #888888;
            --danger: #cf6679;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 20px;
        }
        
        .nav-brand { font-weight: 800; font-size: 1.15rem; color: var(--text-color); text-decoration: none; display: block; margin-bottom: 20px;}
        .nav-brand span { color: var(--primary); }

        .container { max-width: 800px; margin: 0 auto; }
        
        h2 { text-transform: uppercase; letter-spacing: 1px; border-bottom: 2px solid var(--primary); padding-bottom: 10px;}

        .controls {
            background: var(--card-bg); padding: 20px;
            border-radius: 8px; border: 1px solid var(--border-color);
            margin-bottom: 20px; display: flex; gap: 20px; align-items: center;
        }
        select, input {
            padding: 10px; background: var(--box-bg); color: white;
            border: 1px solid var(--border-color); border-radius: 4px;
            font-size: 1rem; box-sizing: border-box;
        }
        
        .btn { 
            padding: 12px 20px; border: none; border-radius: 6px; 
            font-size: 1rem; cursor: pointer; font-weight: bold; 
            transition: all 0.2s; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn:hover { opacity: 0.85; transform: translateY(-2px); }
        
        /* The Canvas */
        .canvas {
            background: var(--card-bg); padding: 40px; border-radius: 8px;
            border: 2px dashed var(--border-color); min-height: 400px;
            display: flex; flex-direction: column; align-items: center; gap: 30px;
        }
        .coordinator {
            background: rgba(247, 147, 26, 0.05); border: 2px solid var(--primary);
            padding: 20px; border-radius: 8px; text-align: center; 
            width: 100%; max-width: 450px; box-sizing: border-box;
        }
        .keys-container {
            display: flex; flex-direction: column; gap: 20px; align-items: center; width: 100%;
        }
        .key-box {
            background: var(--box-bg); border: 1px solid #555;
            padding: 20px 25px; border-radius: 6px; text-align: center; 
            width: 100%; max-width: 450px; box-sizing: border-box;
            display: flex; flex-direction: column; gap: 15px;
        }
        
        /* Input Group Styles */
        .input-group {
            display: flex; flex-direction: column; text-align: left; gap: 5px;
        }
        .input-group label {
            font-size: 0.75rem; color: var(--primary); 
            text-transform: uppercase; letter-spacing: 0.5px; font-weight: bold;
        }
        .input-group input, .input-group textarea { 
            width: 100%; font-size: 0.9rem; padding: 10px; background: var(--box-bg);
            color: white; border: 1px solid var(--border-color); border-radius: 4px; box-sizing: border-box;
        }
        .input-group textarea { font-family: monospace; resize: vertical; }

        /* Recovery Section Styles */
        .recovery-section {
            width: 100%; max-width: 600px; margin-top: 20px; 
            border-top: 2px solid var(--border-color); padding-top: 30px;
            display: flex; flex-direction: column; gap: 20px;
        }
        
        /* OpSec Warning Banner */
        .opsec-warning {
            background: rgba(207, 102, 121, 0.05);
            border-left: 4px solid var(--danger);
            padding: 12px 15px;
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.5;
        }
        .opsec-warning strong {
            color: var(--danger);
        }

        .qr-btn { 
            background: transparent; border: 1px solid var(--primary); color: var(--primary); 
            padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: all 0.2s;
        }
        .qr-btn:hover { background: rgba(247, 147, 26, 0.1); }
        
        .qr-placeholder {
            width: 420px; height: 420px; margin: 15px auto 0;
            border: 2px dashed #555; display: flex; align-items: center; justify-content: center;
            background: white; color: black; font-weight: bold; font-size: 0.8rem; text-align: center;
            padding: 10px; box-sizing: border-box; border-radius: 8px;
        }
        .qr-placeholder canvas { max-width: 100%; height: auto; }

        .action-buttons {
            display: flex; gap: 15px; justify-content: center; margin-top: 30px; flex-wrap: wrap;
        }

        /* Print Styles */
        @media print {
            body { background: white; color: black; font-size: 12pt; margin: 0; padding: 0; }
            .nav-brand { display: none; }
            .controls, .qr-btn, .action-buttons, .opsec-warning { display: none !important; }
            .canvas { border: none; padding: 0; background: white; display: block; }
            
            h2 { color: black; border-bottom: 2px solid black; }
            
            .coordinator, .key-box { 
                border: 2px solid black; background: white; color: black; 
                page-break-inside: avoid; margin-bottom: 20px; 
                width: 100%; max-width: 100%;
            }
            .keys-container { display: block; }
            
            input, textarea { 
                border: none; border-bottom: 1px solid #999; 
                background: transparent; color: black; border-radius: 0; padding: 5px 0;
            }
            input::placeholder, textarea::placeholder { color: transparent; }
            
            .input-group label { color: black; font-size: 0.85rem;}
            .recovery-section { border-top: 2px solid black; padding-top: 20px; page-break-inside: avoid; }
            .qr-placeholder { border: 2px solid black; }
        }
    </style>

<body>

<div class="container">
    <a href="index.html" class="nav-brand">SafeKeep<span>Bitcoin</span></a>
    
    <h2>Custody Architecture Planner</h2>
    
    <div class="controls">
        <label style="font-weight: bold; text-transform: uppercase; color: var(--primary); font-size: 0.85rem;">Architecture Type:</label>
        <select id="archType">
            <option value="single">Single-Sig (1-of-1)</option>
            <option value="multi-23" selected>Multisig (2-of-3)</option>
            <option value="multi-35">Multisig (3-of-5)</option>
            <option value="xor-2">Seed XOR (2 Parts)</option>
            <option value="xor-3">Seed XOR (3 Parts)</option>
            <option value="xor-4">Seed XOR (4 Parts)</option>
        </select>
    </div>

    <div class="canvas" id="canvas">
        </div>

    <div class="action-buttons">
        <button class="btn" style="background: var(--primary); color: #000;" onclick="window.print()">🖨️ Print</button>
        <button class="btn" style="background: var(--teal); color: #000;" onclick="exportToNote()">🔐 Export to Encrypted Workspace</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const archType = document.getElementById('archType');

    const devices = ['Coldcard Q', 'Coldcard Mk4', 'Trezor Safe 3', 'Trezor Model T', 'BitBox02', 'SeedSigner', 'Paper Backup', 'Steel Plate'];
    const coordinators = ['Sparrow Wallet', 'Specter Desktop', 'Electrum', 'Blue Wallet'];

    function generateSelectHTML(optionsArray, labelText, placeholder) {
        const listId = 'list-' + Math.random().toString(36).substring(2, 9);
        const optionsList = optionsArray.map(opt => `<option value="${opt}">`).join('');
        return `
            <div class="input-group">
                <label>${labelText}</label>
                <input class="data-input" list="${listId}" placeholder="${placeholder}" autocomplete="off">
                <datalist id="${listId}">${optionsList}</datalist>
            </div>
        `;
    }

    function generateInputHTML(labelText, placeholder) {
        return `
            <div class="input-group">
                <label>${labelText}</label>
                <input class="data-input" type="text" placeholder="${placeholder}">
            </div>
        `;
    }

    function generateRecoveryBlock() {
        return `
            <div class="recovery-section">
                <div class="recovery-data" id="recoveryData">
                    <div class="opsec-warning">
                        <strong>⚠️ Privacy Warning:</strong> Output descriptors contain extended public keys (xpubs) that reveal your entire wallet balance and transaction history.
                    </div>
                    <div class="input-group">
                        <label>Output Descriptor</label>
                        <textarea id="descriptorInput" placeholder="wsh(sortedmulti(2,[fingerprint/derivation]xpub...))" rows="10"></textarea>
                    </div>
                    <button class="qr-btn" onclick="generateQR()">Generate Offline QR Code</button>
                    <div class="qr-placeholder" id="qrCanvas">
                        <span id="qrText">QR Code<br>Appears Here</span>
                    </div>
                </div>
            </div>
        `;
    }

    window.generateQR = async function() {
        const input = document.getElementById('descriptorInput').value.trim();
        const qrCanvas = document.getElementById('qrCanvas');

        if (!input) {
            alert("Please paste your output descriptor first.");
            return;
        }

        if (!window.QRCode) {
            alert("QR Library is still loading. Please make sure you pasted the Vite code block into the HTML head.");
            return;
        }

        try {
            const canvasEl = document.createElement('canvas');
            
            await window.QRCode.toCanvas(canvasEl, input, { 
                width: 400, 
                margin: 2, 
                color: { dark: '#000000', light: '#ffffff' } 
            });
            
            qrCanvas.innerHTML = '';
            qrCanvas.style.border = "none"; 
            qrCanvas.style.padding = "0"; 
            qrCanvas.appendChild(canvasEl);
            
        } catch (e) {
            console.error("QR Generation error:", e);
            let errMsg = e.message.includes("too big") ? "Descriptor is too large for a static QR." : "Generation Failed";
            qrCanvas.innerHTML = `<span id="qrText" style="color: red;">${errMsg}</span>`;
            qrCanvas.style.border = "2px dashed red";
        }
    };

    function renderArchitecture() {
        const type = archType.value;
        let html = '';

        if (type.startsWith('multi')) {
            const parts = type.split('-');
            const totalKeys = parseInt(parts[1][1]);
            const requiredKeys = parseInt(parts[1][0]);

            html += `
                <div class="coordinator">
                    <h3 style="margin-top:0; color: var(--primary);">Multisig Quorum (${requiredKeys}-of-${totalKeys})</h3>
                    ${generateSelectHTML(coordinators, 'Coordinator Software', 'Select or type software...')}
                </div>
                <div class="keys-container">
            `;
            for(let i=1; i<=totalKeys; i++) {
                html += `
                    <div class="key-box">
                        <strong class="box-title" style="font-size: 1.1rem; margin-bottom: 5px;">Signer ${i}</strong>
                        ${generateSelectHTML(devices, 'Hardware Device', 'Select or type device...')}
                        ${generateInputHTML('Physical Location', 'e.g. Home Safe')}
                        ${generateInputHTML('Last Seed Word', "e.g. 'abandon'")}
                        ${generateInputHTML('Notes', 'e.g. Passphrase used')}
                    </div>
                `;
            }
            html += `</div>`;
        } 
        else if (type === 'single') {
            html += `
                <div class="coordinator">
                    <h3 style="margin-top:0; color: var(--primary);">Single-Sig (1-of-1)</h3>
                    ${generateSelectHTML(devices, 'Primary Device', 'Select or type device...')}
                </div>
                <div class="keys-container">
                    <div class="key-box">
                        <strong class="box-title" style="font-size: 1.1rem; margin-bottom: 5px;">BIP39 Backup</strong>
                        ${generateSelectHTML(['Steel Plate', 'Paper Backup'], 'Backup Format', 'Select or type format...')}
                        ${generateInputHTML('Physical Location', 'Location...')}
                        ${generateInputHTML('Last Seed Word', "e.g. 'abandon'")}
                        ${generateInputHTML('Notes', 'Notes...')}
                    </div>
                     <div class="key-box">
                        <strong class="box-title" style="font-size: 1.1rem; margin-bottom: 5px;">Passphrase (Optional)</strong>
                        ${generateSelectHTML(['Memory', 'Paper Backup', 'Steel Plate', 'Password Manager'], 'Storage Method', 'Select or type storage...')}
                        ${generateInputHTML('Physical Location', 'Location...')}
                        ${generateInputHTML('Notes', 'Hint or actual string')}
                    </div>
                </div>
            `;
        }
        else if (type.startsWith('xor')) {
            const parts = type.split('-');
            const totalShares = parseInt(parts[1]);

            html += `
                <div class="coordinator">
                    <h3 style="margin-top:0; color: var(--primary);">Seed XOR (${totalShares} Parts)</h3>
                    ${generateSelectHTML(devices, 'Target Hardware Wallet', 'Select or type target device...')}
                    <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 15px; margin-bottom: 0;">All shares are required to reconstruct the master seed.</p>
                </div>
                <div class="keys-container">
            `;
            const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            for(let i=0; i<totalShares; i++) {
                html += `
                    <div class="key-box">
                        <strong class="box-title" style="font-size: 1.1rem; margin-bottom: 5px;">XOR Share ${alphabet[i]}</strong>
                        ${generateSelectHTML(['Paper Backup', 'Steel Plate', 'MicroSD'], 'Storage Media', 'Select or type storage...')}
                        ${generateInputHTML('Physical Location', 'Location...')}
                        ${generateInputHTML('Last Seed Word', "e.g. 'abandon'")}
                        ${generateInputHTML('Notes', 'e.g. Hex vs Words')}
                    </div>
                `;
            }
            html += `</div>`;
        }

        html += generateRecoveryBlock();
        canvas.innerHTML = html;
    }

    function checkForImportData() {
        const importDataStr = localStorage.getItem('safeKeepArchExport');
        if (importDataStr) {
            try {
                const data = JSON.parse(importDataStr);
                
                if (data.archType) {
                    archType.value = data.archType;
                }
                
                renderArchitecture();
                
                if (data.descriptor) {
                    document.getElementById('descriptorInput').value = data.descriptor;
                }

                // Map Last Words and Passphrases seamlessly
                if (data.lastWords && data.lastWords.length > 0) {
                    const keyBoxes = document.querySelectorAll('.key-box');
                    
                    if (data.archType === 'single') {
                        // Map Single-Sig Seed
                        if (keyBoxes[0]) {
                            const inputs = keyBoxes[0].querySelectorAll('input'); 
                            if (inputs[2] && data.lastWords[0]) inputs[2].value = data.lastWords[0];
                        }
                        // Map Single-Sig Passphrase
                        if (keyBoxes[1] && data.passphrases && data.passphrases[0]) {
                            const inputs = keyBoxes[1].querySelectorAll('input');
                            if (inputs[2]) inputs[2].value = "Passphrase: " + data.passphrases[0];
                        }
                    } else {
                        // Map Multi-Sig
                        data.lastWords.forEach((word, index) => {
                            if (keyBoxes[index]) {
                                const inputs = keyBoxes[index].querySelectorAll('input'); 
                                if (inputs[2] && word) {
                                    inputs[2].value = word;
                                }
                                if (inputs[3] && data.passphrases && data.passphrases[index]) {
                                    inputs[3].value = "Passphrase: " + data.passphrases[index];
                                }
                            }
                        });
                    }
                }

                setTimeout(() => {
                    if(window.QRCode && document.getElementById('descriptorInput').value) {
                        window.generateQR();
                    }
                }, 200);

            } catch (e) {
                console.error("Failed to parse imported architecture data", e);
            } finally {
                localStorage.removeItem('safeKeepArchExport');
            }
        } else {
            renderArchitecture();
        }
    }

    window.exportToNote = function() {
        const archName = archType.options[archType.selectedIndex].text;
        let noteHtml = `<h2>Custody Architecture Plan</h2>`;
        noteHtml += `<p style="color: var(--teal); font-size: 1.1rem;"><strong>Type:</strong> ${archName}</p>`;
        
        const coordinatorInput = document.querySelector('.coordinator input');
        if(coordinatorInput && coordinatorInput.value) {
            noteHtml += `<p><strong>Coordinator / Target Device:</strong> ${coordinatorInput.value}</p>`;
        }

        const keyBoxes = document.querySelectorAll('.key-box');
        if(keyBoxes.length > 0) {
            noteHtml += `<h3>Signers / Backups</h3><ul>`;
            keyBoxes.forEach(box => {
                const title = box.querySelector('.box-title').innerText;
                const inputs = box.querySelectorAll('input');
                
                let details = [];
                if(inputs[0] && inputs[0].value) details.push(`<strong>Format:</strong> ${inputs[0].value}`);
                if(inputs[1] && inputs[1].value) details.push(`<strong>Location:</strong> ${inputs[1].value}`);
                if(inputs[2] && inputs[2].value) details.push(`<strong>Last Word:</strong> ${inputs[2].value}`);
                if(inputs[3] && inputs[3].value) details.push(`<strong>Notes:</strong> ${inputs[3].value}`);
                
                let liContent = `<span style="color: var(--orange); font-size: 1.1em;">${title}</span><br>`;
                liContent += details.length > 0 ? details.join(' | ') : '<em>No details entered</em>';
                noteHtml += `<li style="margin-bottom: 10px;">${liContent}</li>`;
            });
            noteHtml += `</ul>`;
        }

        const descriptor = document.getElementById('descriptorInput').value.trim();
        if(descriptor) {
            noteHtml += `<h3>Output Descriptor</h3>`;
            noteHtml += `<p style="font-family: monospace; background: #2c2c2c; padding: 15px; border-radius: 5px; color: var(--teal); word-break: break-all; border: 1px solid #444;">${descriptor}</p>`;
        }

        sessionStorage.setItem('safeKeepDraftNote', noteHtml);
        localStorage.setItem('safeKeepDraftNote', noteHtml);
        
        const plainText = noteHtml.replace(/<[^>]+>/g, '\n').replace(/\n\s*\n/g, '\n');
        navigator.clipboard.writeText(plainText).then(() => {
            alert("Architecture plan saved!\n\nOpening Encrypted Workspace to finalize your document...");
            window.open('secure-notes.html', '_blank');
        }).catch(err => {
            window.open('secure-notes.html', '_blank');
        });
    }

    archType.addEventListener('change', renderArchitecture);
    
    // Initialize by checking for imports
    checkForImportData();
</script>

</body>
</html>
